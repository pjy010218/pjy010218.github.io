<!doctype html>
<html lang="en" class="no-js">
  <head>
    <meta charset="utf-8">

    {% include seo.html %}

    <link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ '/feed.xml' | absolute_url }}{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

    <meta name="HandheldFriendly" content="True">
    <meta name="MobileOptimized" content="320">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
      document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
    </script>

    <link rel="stylesheet" href="{{ '/assets/css/main.css' | absolute_url }}">
    <link rel="shortcut icon" type="image/x-icon" href="{{ site.favicon | absolute_url }}">
    <meta http-equiv="cleartype" content="on">

    <!-- Academic & Editorial Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,800;1,400&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --color-bg: #f5f5f0;
        --color-text: #222222;
        --color-sub: #777777;
        --color-border: #dcdccb;
        --color-accent: #000000;
        --font-serif: 'Crimson Pro', serif;
        --font-mono: 'JetBrains Mono', monospace;
      }
      
      body { 
        background-color: var(--color-bg); 
        color: var(--color-text); 
        margin: 0; 
        font-family: var(--font-serif);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .academic-layout {
        display: flex;
        min-height: 100vh;
        width: 100%;
        box-sizing: border-box;
        padding: 50px 60px;
      }

      /* Fixed Minimal Left Rail */
      .sidebar {
        width: 250px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: sticky;
        top: 50px;
        height: calc(100vh - 100px);
        font-family: var(--font-mono);
        font-size: 0.75rem;
        line-height: 1.6;
      }

      .sidebar-top h1 {
        font-family: var(--font-serif);
        font-size: 3rem;
        margin: 0 0 15px 0;
        font-weight: 800;
        line-height: 0.9;
        letter-spacing: -1px;
      }
      
      .sidebar-top h1 a { 
        color: var(--color-text); 
        text-decoration: none; 
      }
      
      .sidebar-desc {
        color: var(--color-sub);
        margin-bottom: 40px;
        font-size: 0.7rem;
      }

      .sidebar-nav {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      
      .sidebar-nav a {
        color: var(--color-text);
        text-decoration: none;
        text-transform: uppercase;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: opacity 0.2s;
        letter-spacing: 0.5px;
      }
      
      .sidebar-nav a:hover { opacity: 0.5; }
      .sidebar-nav a span { color: var(--color-sub); font-size: 0.6rem; }

      .sidebar-bottom {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .sidebar-bottom a {
        color: var(--color-sub);
        text-decoration: none;
      }
      
      .sidebar-bottom a:hover { color: var(--color-text); }

      /* Right Content Area */
      .main-content {
        flex: 1;
        padding-left: 60px;
        display: flex;
        flex-direction: column;
      }

      @media (max-width: 900px) {
        .academic-layout { flex-direction: column; padding: 30px 20px; }
        .sidebar { width: 100%; height: auto; position: relative; top: 0; margin-bottom: 50px; }
        .sidebar-bottom { margin-top: 30px; }
        .main-content { padding-left: 0; }
      }
    </style>
  </head>

  <body class="layout--{{ page.layout | default: layout.layout }}">
    <div class="academic-layout">
      <!-- Mega Style Left Minimal Intro -->
      <aside class="sidebar">
        <div class="sidebar-top">
          <h1><a href="{{ '/' | absolute_url }}">P<br>J<br>Y.</a></h1>
          <div class="sidebar-desc">
            대한민국에서 사이버 보안을 공부 중인 학생입니다.<br>
            시스템 보안을 전공하며 AI, 클라우드 및 최신 보안 기술에 주력하고 있습니다.
          </div>
          
          <nav class="sidebar-nav">
            <a href="{{ '/' | relative_url }}"><span>01</span> Research</a>
            <a href="{{ '/papers/' | relative_url }}"><span>02</span> Publications</a>
          </nav>
        </div>
        
        <div class="sidebar-bottom">
          <span style="color: var(--color-text); font-weight: 600; margin-bottom: 5px;">CONTACT & SOCIAL</span>
          <a href="mailto:pjy010218@gmail.com">pjy010218@gmail.com</a>
          <a href="https://github.com/pjy010218" target="_blank">Github</a>
          <a href="https://www.linkedin.com/in/준영-박-0414623a0/" target="_blank">LinkedIn</a>
        </div>
      </aside>

      <!-- Cascading Content Right Area -->
      <main class="main-content">
        {{ content }}
      </main>
    </div>

    <script src="{{ '/compressed.js' | absolute_url }}"></script>
    {% include analytics.html %}
  </body>
</html>
